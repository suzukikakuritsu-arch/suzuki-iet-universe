name: Generate Cosmic Movie
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg
          pip install numpy matplotlib scikit-learn
      - name: Run Simulation
        run: python sim_engine.py
      - name: Commit Movie
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add suzuki_universe_evolution.mp4
          git commit -m "Update Universe Evolution Movie" || exit 0
          git push
