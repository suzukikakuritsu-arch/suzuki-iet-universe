<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Suzuki IET Universe</title>
    <style>
        body { 
            margin: 0; 
            background: black; 
            color: #00ffff; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
        }
        video { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1;
        }
        #overlay { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            background: rgba(0,0,0,0.6); 
            padding: 15px; 
            border-left: 3px solid #00ffff;
            pointer-events: none;
            letter-spacing: 2px;
        }
        .status { font-size: 0.8em; color: #555; }
    </style>
</head>
<body>
    <div id="overlay">
        <strong>SUZUKI IET UNIVERSE</strong><br>
        EMERGENCE: ACTIVE<br>
        PARTICLES: 1600<br>
        <span class="status">SYNCED WITH DEEP MEMORY</span>
    </div>

    <video autoplay muted loop playsinline src="suzuki_universe_evolution.mp4"></video>

    <script>
        // 動画の読み込みエラー対策
        const v = document.querySelector('video');
        v.addEventListener('error', () => {
            console.log("Waiting for movie generation...");
        });
    </script>
</body>
</html>
